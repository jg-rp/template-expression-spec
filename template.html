<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>$title$</title>

    $if(author)$
    <meta name="author" content="$author$" />
    $endif$

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    $for(css)$
    <link rel="stylesheet" href="$css$" />
    $endfor$

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="page">
      <header class="title-block">
        <h1>$title$</h1>
        $if(author)$
        <p>$author$ (<a href="$srcUrl$">source</a>)</p>
        $endif$ $if(date)$
        <p>$date$</p>
        $endif$
      </header>

      <nav id="TOC">
        <details open>
          <summary>Table of Contents</summary>
          $table-of-contents$
        </details>
      </nav>

      <main>$body$</main>
    </div>

    <script>
      document.querySelectorAll("h1, h2, h3, h4, h5").forEach((h) => {
        const section = h.closest("section[id]");
        if (!section) return;

        const id = section.id;

        const a = document.createElement("a");
        a.href = "#" + id;
        a.className = "header-link";
        a.textContent = "§";

        h.appendChild(a);
      });
    </script>

    <script>
      window.MathJax = {
        chtml: {
          scale: 0.9,
          // displayAlign: "left",
          // displayIndent: "1em",
        },
        svg: {
          scale: 0.9,
          // displayAlign: "left",
          // displayIndent: "1em",
        },
      };
    </script>

    <script
      id="MathJax-script"
      async
      src="https://cdn.jsdelivr.net/npm/mathjax@4/tex-mml-chtml.js"
    ></script>
  </body>
</html>
